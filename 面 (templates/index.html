<!DOCTYPE html>
<head>
    <title>WEEX 雲端自動交易監控</title>
    <meta charset="UTF-8">
    <style>
        body { background: #0e1111; color: #00ffcc; font-family: "Microsoft JhengHei"; padding: 40px; }
        .stat-card { background: #1a1d1d; border: 1px solid #333; padding: 20px; border-radius: 8px; }
        .log-box { margin-top: 20px; background: #000; padding: 15px; height: 300px; overflow-y: scroll; border-radius: 5px; color: #fff; }
    </style>
</head>
<body>
    <h1>24H 加密貨幣自動化系統 (SMC 模組)</h1>
    <div class="stat-card">
        <h2>目前資產餘額: <span style="color:yellow">{{ history.balance }} USDT</span></h2>
        <p>狀態: 24H 雲端掃描中 (成交量 Top 50)</p>
    </div>
    <h3>即時交易日誌</h3>
    <div class="log-box">
        {% for log in history.logs %}
        <div>[訊號] {{ log }}</div>
        {% endfor %}
    </div>
</body>
</html>
